<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TicketRadar — API Docs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<!-- Swagger UI via CDN -->
<link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0D0D0D; font-family: 'Inter', sans-serif; }

  .topbar-custom {
    background: #141414;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-logo {
    font-size: 1.1rem; font-weight: 700; color: #F0F0F5;
    display: flex; align-items: center; gap: 8px;
  }
  .topbar-logo span { color: #FF4B6E; }
  .topbar-links { display: flex; gap: 16px; }
  .topbar-links a {
    color: #8B8FA3; text-decoration: none;
    font-size: 0.85rem; font-weight: 500;
    transition: color 0.2s;
  }
  .topbar-links a:hover { color: #F0F0F5; }

  /* Override Swagger UI para dark mode */
  .swagger-ui { background: #0D0D0D; }
  .swagger-ui .wrapper { padding: 20px; }
  .swagger-ui .info { margin: 20px 0 30px; }
  .swagger-ui .info .title { color: #F0F0F5; font-family: 'Inter', sans-serif; }
  .swagger-ui .info p, .swagger-ui .info li,
  .swagger-ui .info table thead tr th,
  .swagger-ui .info table tbody tr td { color: #8B8FA3; }
  .swagger-ui .scheme-container { background: #141414; border: 1px solid rgba(255,255,255,0.08); padding: 16px; border-radius: 8px; }
  .swagger-ui select { background: #1A1A1A; color: #F0F0F5; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; padding: 6px 10px; }
  .swagger-ui .opblock-tag { color: #F0F0F5; border-bottom: 1px solid rgba(255,255,255,0.08); font-family: 'Inter', sans-serif; }
  .swagger-ui .opblock-tag:hover { background: rgba(255,255,255,0.03); }
  .swagger-ui .opblock { border-radius: 8px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.08); }
  .swagger-ui .opblock .opblock-summary { border-radius: 8px; }
  .swagger-ui .opblock.opblock-get { background: rgba(6,214,160,0.05); border-color: rgba(6,214,160,0.2); }
  .swagger-ui .opblock.opblock-post { background: rgba(255,75,110,0.05); border-color: rgba(255,75,110,0.2); }
  .swagger-ui .opblock.opblock-delete { background: rgba(255,100,50,0.05); border-color: rgba(255,100,50,0.2); }
  .swagger-ui .opblock-summary-method { border-radius: 4px; font-family: 'Inter', sans-serif; font-weight: 700; }
  .swagger-ui .opblock-summary-path, .swagger-ui .opblock-summary-description { color: #F0F0F5; }
  .swagger-ui .opblock-body pre { background: #1A1A1A; color: #06D6A0; border-radius: 6px; }
  .swagger-ui .model-box { background: #1A1A1A; border-radius: 6px; }
  .swagger-ui .model { color: #F0F0F5; }
  .swagger-ui .prop-type { color: #FF4B6E; }
  .swagger-ui table thead tr th, .swagger-ui table tbody tr td { color: #8B8FA3; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .swagger-ui .btn { border-radius: 6px; font-family: 'Inter', sans-serif; font-weight: 600; }
  .swagger-ui .btn.execute { background: #FF4B6E; border-color: #FF4B6E; }
  .swagger-ui .btn.execute:hover { background: #e03358; }
  .swagger-ui section.models { background: #141414; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; }
  .swagger-ui section.models h4 { color: #F0F0F5; }
  .swagger-ui .parameter__name { color: #FFD166; }
  .swagger-ui .parameter__type { color: #8B8FA3; }
  .swagger-ui input[type=text], .swagger-ui textarea { background: #1A1A1A; color: #F0F0F5; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; }
  .swagger-ui .response-col_status { color: #06D6A0; }
  .swagger-ui .response-col_description { color: #8B8FA3; }
  /* Esconde o topbar padrão do Swagger */
  .swagger-ui .topbar { display: none; }
</style>
</head>
<body>

<div class="topbar-custom">
  <div class="topbar-logo">🎟️ <span>Ticket</span>Radar <span style="color:#8B8FA3;font-weight:400;font-size:0.85rem;margin-left:8px">API Docs</span></div>
  <div class="topbar-links">
    <a href="/">Landing</a>
    <a href="/dashboard.html">Dashboard</a>
    <a href="/privacidade.html">Privacidade</a>
  </div>
</div>

<div id="swagger-ui"></div>

<script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-bundle.js"></script>
<script>
  window.onload = () => {
    SwaggerUIBundle({
      url: "/openapi.yaml",
      dom_id: '#swagger-ui',
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIBundle.SwaggerUIStandalonePreset
      ],
      layout: "BaseLayout",
      deepLinking: true,
      defaultModelsExpandDepth: 1,
      defaultModelExpandDepth: 2,
      docExpansion: "list",
      filter: true,
      showExtensions: true,
      showCommonExtensions: true,
      tryItOutEnabled: true,
    });
  };
</script>
</body>
</html>
