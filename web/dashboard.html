<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TicketRadar · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0D0D0D;
    --bg2: #111114;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.08);
    --green: #06D6A0;
    --red: #FF4B6E;
    --gray: #8B8FA3;
    --text: #E8E8F0;
    --text-dim: #6B6F80;
    --radius: 14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    padding-bottom: 48px;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,13,13,0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--glass-border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo span { color: var(--text-dim); font-weight: 400; }

  #health-badge {
    font-size: 13px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    transition: all 0.4s ease;
    letter-spacing: 0.2px;
  }

  #health-badge.online  { color: var(--green); border-color: rgba(6,214,160,0.25); background: rgba(6,214,160,0.08); }
  #health-badge.offline { color: var(--red);   border-color: rgba(255,75,110,0.25); background: rgba(255,75,110,0.08); }

  /* ── LAYOUT ── */
  main { max-width: 1200px; margin: 0 auto; padding: 32px 20px 0; }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--glass-border);
  }

  section { margin-bottom: 40px; }

  /* ── CARDS ── */
  .card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    padding: 20px;
    transition: opacity 0.3s ease, transform 0.2s ease;
  }

  .card.flash {
    animation: flashUpdate 0.5s ease;
  }

  @keyframes flashUpdate {
    0%   { opacity: 0.4; }
    100% { opacity: 1; }
  }

  /* ── EVENTOS GRID ── */
  #events-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .event-card { position: relative; overflow: hidden; }

  .event-name {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 12px;
    line-height: 1.3;
    color: var(--text);
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 5px 10px;
    border-radius: 8px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .status-badge.available {
    color: var(--green);
    background: rgba(6,214,160,0.12);
    border: 1px solid rgba(6,214,160,0.2);
  }

  .status-badge.soldout {
    color: var(--red);
    background: rgba(255,75,110,0.12);
    border: 1px solid rgba(255,75,110,0.2);
  }

  .status-badge.unknown {
    color: var(--gray);
    background: rgba(139,143,163,0.10);
    border: 1px solid rgba(139,143,163,0.15);
  }

  .pulse-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 rgba(6,214,160,0.6);
    animation: pulse 1.8s infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(6,214,160,0.6); }
    70%  { box-shadow: 0 0 0 7px rgba(6,214,160,0); }
    100% { box-shadow: 0 0 0 0 rgba(6,214,160,0); }
  }

  .last-check {
    font-size: 12px;
    color: var(--text-dim);
  }

  .last-check strong { color: var(--text); font-weight: 500; }

  /* Glow strip on available */
  .event-card.is-available::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 0.7;
  }

  /* ── METRICS ROW ── */
  #metrics-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  @media (max-width: 600px) {
    #metrics-row { grid-template-columns: 1fr; }
  }

  .metric-card { text-align: center; padding: 24px 16px; }

  .metric-icon {
    font-size: 22px;
    margin-bottom: 8px;
    display: block;
  }

  .metric-value {
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 6px;
    font-variant-numeric: tabular-nums;
    background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.5));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .metric-label {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  /* ── LOG TABLE ── */
  .log-wrap {
    overflow-x: auto;
    border-radius: var(--radius);
    border: 1px solid var(--glass-border);
    background: var(--glass);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead tr {
    border-bottom: 1px solid var(--glass-border);
  }

  th {
    padding: 12px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-dim);
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.03);
    transition: background 0.15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.03); }

  td {
    padding: 11px 16px;
    color: var(--text);
    font-weight: 400;
    white-space: nowrap;
  }

  td.time { color: var(--text-dim); font-variant-numeric: tabular-nums; font-size: 12px; }

  .row-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-weight: 600;
    font-size: 12px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot.green  { background: var(--green); }
  .dot.red    { background: var(--red); }
  .dot.gray   { background: var(--gray); }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 48px 16px;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    main { padding: 20px 12px 0; }
    .event-name { font-size: 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🎟️ TicketRadar <span>· Dashboard</span></div>
  <div id="health-badge">⬛ Verificando…</div>
</header>

<main>

  <!-- EVENTOS -->
  <section>
    <div class="section-title">Eventos Monitorados</div>
    <div id="events-grid">
      <div class="empty">Carregando eventos…</div>
    </div>
  </section>

  <!-- MÉTRICAS -->
  <section>
    <div class="section-title">Métricas</div>
    <div id="metrics-row">
      <div class="card metric-card">
        <span class="metric-icon">📋</span>
        <div class="metric-value" id="m-waitlist">—</div>
        <div class="metric-label">Na Waitlist</div>
      </div>
      <div class="card metric-card">
        <span class="metric-icon">⏱️</span>
        <div class="metric-value" id="m-uptime">—</div>
        <div class="metric-label">Uptime</div>
      </div>
      <div class="card metric-card">
        <span class="metric-icon">🔍</span>
        <div class="metric-value" id="m-checks">—</div>
        <div class="metric-label">Checks Realizados</div>
      </div>
    </div>
  </section>

  <!-- LOG -->
  <section>
    <div class="section-title">Log de Atividade</div>
    <div class="log-wrap">
      <table>
        <thead>
          <tr>
            <th>Horário</th>
            <th>Evento</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="log-body">
          <tr><td colspan="3" class="empty">Carregando histórico…</td></tr>
        </tbody>
      </table>
    </div>
  </section>

</main>

<script>
(function () {
  'use strict';

  // ── helpers ──────────────────────────────────────────────────────────────
  function statusClass(s) {
    if (!s) return 'unknown';
    const u = s.toUpperCase();
    if (u === 'SOLD_OUT' || u === 'SOLDOUT') return 'soldout';
    if (['IN_SALE','ON_SALE','AVAILABLE','IN SALE','ON SALE'].includes(u)) return 'available';
    return 'unknown';
  }

  function statusLabel(s) {
    if (!s) return 'DESCONHECIDO';
    const u = s.toUpperCase();
    if (u === 'SOLD_OUT' || u === 'SOLDOUT') return 'ESGOTADO';
    if (['IN_SALE','ON_SALE','AVAILABLE','IN SALE','ON SALE'].includes(u)) return 'DISPONÍVEL';
    return 'DESCONHECIDO';
  }

  function dotClass(s) {
    const c = statusClass(s);
    if (c === 'available') return 'green';
    if (c === 'soldout') return 'red';
    return 'gray';
  }

  function nowHHMMSS() {
    return new Date().toLocaleTimeString('pt-BR', { hour12: false });
  }

  function fmtUptime(seconds) {
    if (isNaN(seconds) || seconds === null) return '—';
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = Math.floor(seconds % 60);
    if (h > 0) return h + 'h ' + String(m).padStart(2,'0') + 'm';
    if (m > 0) return m + 'm ' + String(s).padStart(2,'0') + 's';
    return s + 's';
  }

  function flash(el) {
    if (!el) return;
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
  }

  async function safeFetch(url) {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 8000);
    try {
      const r = await fetch(url, { signal: ctrl.signal, cache: 'no-store' });
      clearTimeout(tid);
      if (r.status === 401) return { __auth_error: true };
      if (!r.ok) return null;
      return await r.json();
    } catch (_) {
      clearTimeout(tid);
      return null;
    }
  }

  // ── health ───────────────────────────────────────────────────────────────
  async function checkHealth() {
    const badge = document.getElementById('health-badge');
    const data = await safeFetch('/health');
    if (data !== null) {
      badge.textContent = '🟢 Online';
      badge.className = 'online';
    } else {
      badge.textContent = '🔴 Offline';
      badge.className = 'offline';
    }
  }

  // ── status ───────────────────────────────────────────────────────────────
  // cache: { eventName -> { status, lastSeen } }
  const eventCache = {};

  async function fetchStatus() {
    const data = await safeFetch('/api/status');
    const grid = document.getElementById('events-grid');
    if (!data || typeof data !== 'object') return;

    const entries = Object.entries(data);
    if (entries.length === 0) {
      grid.innerHTML = '<div class="empty">Nenhum evento monitorado.</div>';
      return;
    }

    entries.forEach(([name, status]) => {
      const cls   = statusClass(status);
      const label = statusLabel(status);
      const time  = nowHHMMSS();

      eventCache[name] = { status, lastSeen: time };

      const existing = document.getElementById('ev-' + CSS.escape(name));
      if (existing) {
        // update in-place
        existing.className = 'card event-card' + (cls === 'available' ? ' is-available' : '');
        const badgeEl = existing.querySelector('.status-badge');
        badgeEl.className = 'status-badge ' + cls;
        badgeEl.innerHTML = cls === 'available'
          ? '<span class="pulse-dot"></span>' + label
          : label;
        existing.querySelector('.last-check strong').textContent = time;
        flash(existing);
      } else {
        // create card
        const card = document.createElement('div');
        card.className = 'card event-card' + (cls === 'available' ? ' is-available' : '');
        card.id = 'ev-' + name;
        card.innerHTML =
          '<div class="event-name">' + esc(name) + '</div>' +
          '<div class="status-badge ' + cls + '">' +
            (cls === 'available' ? '<span class="pulse-dot"></span>' : '') +
            label +
          '</div>' +
          '<div class="last-check">Último check: <strong>' + time + '</strong></div>';

        // remove placeholder if present
        const placeholder = grid.querySelector('.empty');
        if (placeholder) placeholder.remove();

        grid.appendChild(card);
      }
    });
  }

  // ── metrics ──────────────────────────────────────────────────────────────
  function setVal(id, val) {
    const el = document.getElementById(id);
    if (!el) return;
    const prev = el.textContent;
    const next = String(val);
    if (prev !== next) { el.textContent = next; flash(el.closest('.card')); }
  }

  async function fetchMetrics() {
    const data = await safeFetch('/api/metrics');
    if (!data) return;
    if (data.__auth_error) {
      ['m-waitlist', 'm-uptime', 'm-checks'].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.style.fontSize = '14px';
          el.style.webkitTextFillColor = 'var(--gray)';
          el.textContent = '—';
        }
      });
      // Mostrar mensagem de acesso restrito na seção de métricas
      const metricsRow = document.getElementById('metrics-row');
      if (metricsRow && !document.getElementById('metrics-auth-msg')) {
        const msg = document.createElement('div');
        msg.id = 'metrics-auth-msg';
        msg.style.cssText = 'grid-column:1/-1;text-align:center;padding:16px;color:var(--gray);font-size:13px;';
        msg.textContent = '🔒 Acesso restrito — faça login como admin';
        metricsRow.appendChild(msg);
      }
      return;
    }
    setVal('m-waitlist', data.waitlist_count   ?? '—');
    setVal('m-uptime',   fmtUptime(data.uptime_seconds));
    setVal('m-checks',   data.total_checks     ?? '—');
  }

  // ── history ──────────────────────────────────────────────────────────────
  async function fetchHistory() {
    const data = await safeFetch('/api/history?limit=20');
    const tbody = document.getElementById('log-body');
    if (!data || !Array.isArray(data) || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3" class="empty">Sem histórico disponível.</td></tr>';
      return;
    }
    const rows = data.map(entry => {
      const dc = dotClass(entry.status);
      const lb = statusLabel(entry.status);
      return '<tr>' +
        '<td class="time">' + esc(entry.at || '—') + '</td>' +
        '<td>' + esc(entry.event || '—') + '</td>' +
        '<td><span class="row-status"><span class="dot ' + dc + '"></span>' + lb + '</span></td>' +
      '</tr>';
    }).join('');
    tbody.innerHTML = rows;
  }

  // ── escape ───────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ── tick ─────────────────────────────────────────────────────────────────
  async function tick() {
    await Promise.allSettled([
      checkHealth(),
      fetchStatus(),
      fetchMetrics(),
      fetchHistory(),
    ]);
  }

  // ── init ─────────────────────────────────────────────────────────────────
  tick();
  setInterval(tick, 30000);
})();
</script>
</body>
</html>
