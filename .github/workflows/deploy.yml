name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  # Roda CI inline antes de deployar (garante que o código passou)
  build-and-test:
    name: Build, Vet & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - run: go mod download
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -race

  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Trigger Railway redeploy
        run: |
          echo "CI passou — disparando deploy no Railway..."
          RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceRedeploy(serviceId: \"763ab83e-b8e5-4298-b319-b4eed99201ef\", environmentId: \"ef29ff9e-e5a4-40b8-b3be-3065293cc0a4\") }"}')
          if echo "$RESPONSE" | grep -q '"errors"'; then
            echo "Falha: $RESPONSE"
            exit 1
          fi
          echo "Deploy disparado com sucesso!"

      - name: Smoke test
        run: |
          echo "Aguardando Railway subir (90s)..."
          sleep 90
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://ticketradar.com.br/health)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Smoke test OK (tentativa $i)"
              exit 0
            fi
            echo "⏳ Tentativa $i: HTTP $STATUS"
            sleep 30
          done
          echo "❌ Smoke test falhou"
          exit 1
